name: CI

on:
  push:
    paths-ignore:
      - "docs/**"
      - "*.md"
    branches:
      - main
  pull_request:
    paths-ignore:
      - "docs/**"
      - "*.md"
    branches:
      - main

jobs:
  build:
    name: Build and Test (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: ESLint
        run: bun run lint

      - name: Types
        run: bun run typecheck

      - name: Build
        run: bun run build

  status-check:
    name: CI Status
    runs-on: ubuntu-latest
    needs: build
    steps:
      - run: echo "All good. Build is green."
