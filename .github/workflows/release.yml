name: Release Docker Image

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  push_to_registries:
    name: Push Docker image to GHCR
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker tags
        id: meta
        run: |
          version_tag="${{github.ref_name}}"
          CLEAN_TAG=$(echo $version_tag | sed 's/^v//')
          
          TAGS="ghcr.io/${{ github.repository_owner }}/waffle:${CLEAN_TAG}"
          
          if [[ "$version_tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            TAGS="${TAGS},ghcr.io/${{ github.repository_owner }}/waffle:latest"
            TAGS="${TAGS},ghcr.io/${{ github.repository_owner }}/waffle:$(echo $CLEAN_TAG | cut -d. -f1)"
          fi
          
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker images
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
